<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Teal badge background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#1D9E75"/>

  <!-- Pixel "B" — stem -->
  <rect x="18" y="16" width="14" height="68" rx="3" fill="white" opacity="0.95"/>

  <!-- Top horizontal bar -->
  <rect x="32" y="16" width="28" height="14" rx="3" fill="white" opacity="0.95"/>
  <!-- Top-right vertical -->
  <rect x="60" y="16" width="14" height="21" rx="3" fill="white" opacity="0.95"/>

  <!-- Mid horizontal bar -->
  <rect x="32" y="37" width="28" height="13" rx="3" fill="white" opacity="0.95"/>
  <!-- Mid-right vertical -->
  <rect x="60" y="50" width="14" height="20" rx="3" fill="white" opacity="0.95"/>

  <!-- Bottom horizontal bar -->
  <rect x="32" y="70" width="28" height="14" rx="3" fill="white" opacity="0.95"/>

  <!-- Speed dots (bottom-right corner) -->
  <circle cx="74" cy="88" r="3.5" fill="white" opacity="0.3"/>
  <circle cx="84" cy="88" r="3.5" fill="white" opacity="0.7"/>
</svg>
